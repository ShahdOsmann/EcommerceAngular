<header class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2 group">
        <div class="w-8 h-8 bg-gray-900 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
        </div>
        <span class="text-xl font-serif font-bold text-gray-900 group-hover:text-gray-600 transition-colors">
          ShopLux
        </span>
      </a>

      <!-- Nav Links -->
      <nav class="hidden md:flex items-center gap-8">
        <a routerLink="/" routerLinkActive="text-gray-900 font-semibold"
           [routerLinkActiveOptions]="{exact: true}"
           class="text-sm text-gray-600 hover:text-gray-900 transition-colors">
          Home
        </a>
        <a routerLink="/products" routerLinkActive="text-gray-900 font-semibold"
           class="text-sm text-gray-600 hover:text-gray-900 transition-colors">
          Products
        </a>
        <a routerLink="/orders" routerLinkActive="text-gray-900 font-semibold"
           class="text-sm text-gray-600 hover:text-gray-900 transition-colors">
          My Orders
        </a>
      </nav>

      <!-- Cart Icon -->
      <a routerLink="/cart" class="relative flex items-center gap-2 text-gray-700 hover:text-gray-900 transition-colors">
        <div class="relative">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span *ngIf="cartItemCount > 0"
            class="absolute -top-2 -right-2 w-5 h-5 bg-gray-900 text-white text-xs rounded-full flex items-center justify-center font-medium">
            {{ cartItemCount }}
          </span>
        </div>
        <span class="hidden sm:block text-sm font-medium">Cart</span>
      </a>
    </div>
  </div>
</header>

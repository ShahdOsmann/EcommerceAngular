<div class="min-h-screen bg-gray-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <h1 class="text-4xl font-serif font-bold text-gray-900 mb-8">All Products</h1>

    <div class="flex flex-col lg:flex-row gap-8">

      <!-- Sidebar Filters -->
      <aside class="w-full lg:w-64 shrink-0">
        <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm sticky top-24">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-lg font-semibold text-gray-900">Filters</h2>
            <button (click)="resetFilters()"
              class="text-sm text-gray-500 hover:text-gray-900 underline transition-colors">
              Reset
            </button>
          </div>

          <!-- Search -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
            <input
              type="text"
              [(ngModel)]="searchValue"
              (ngModelChange)="onSearch($event)"
              placeholder="Search products..."
              class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
          </div>

          <!-- Category -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
            <select
              (change)="onCategoryChange($any($event.target).value)"
              class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
              <option value="">All Categories</option>
              <option *ngFor="let cat of productsService.categories()" [value]="cat.id">
                {{ cat.name }}
              </option>
            </select>
          </div>

          <!-- Price Range -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Price Range</label>
            <div class="flex gap-2">
              <input
                type="number"
                [(ngModel)]="minPriceValue"
                (ngModelChange)="onMinPrice($event)"
                placeholder="Min"
                class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" />
              <input
                type="number"
                [(ngModel)]="maxPriceValue"
                (ngModelChange)="onMaxPrice($event)"
                placeholder="Max"
                class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" />
            </div>
          </div>

          <!-- Sort -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Sort By</label>
            <select
              (change)="onSortChange($any($event.target).value)"
              class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
              <option value="default">Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="name-asc">Name: A–Z</option>
              <option value="name-desc">Name: Z–A</option>
            </select>
          </div>
        </div>
      </aside>

      <!-- Products Grid -->
      <div class="flex-1">

        <!-- Loading -->
        <div *ngIf="productsService.isLoading()" class="flex justify-center items-center h-64">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-gray-900"></div>
        </div>

        <!-- Empty -->
        <div *ngIf="!productsService.isLoading() && productsService.filteredProducts().length === 0"
          class="flex flex-col items-center justify-center h-64 text-center">
          <svg class="w-12 h-12 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p class="text-gray-500 text-lg font-medium">No products found</p>
          <button (click)="resetFilters()" class="mt-3 text-sm text-gray-900 underline">Clear filters</button>
        </div>

        <!-- Grid -->
        <div *ngIf="!productsService.isLoading()" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
          <div *ngFor="let product of productsService.filteredProducts()"
            class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden hover:shadow-lg transition-all duration-300 group flex flex-col">

            <!-- Image -->
            <a [routerLink]="['/products', product.id]" class="block overflow-hidden aspect-square bg-gray-100">
              <img
                [src]="product.image"
                [alt]="product.name"
                class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            </a>

            <!-- Info -->
            <div class="p-5 flex flex-col flex-1">
              <div class="flex-1">
                <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">
                  {{ productsService.getCategoryName(product.categoryId) }}
                </span>
                <a [routerLink]="['/products', product.id]">
                  <h3 class="mt-1 text-lg font-semibold text-gray-900 hover:text-gray-600 transition-colors line-clamp-1">
                    {{ product.name }}
                  </h3>
                </a>
                <p class="mt-1 text-sm text-gray-500 line-clamp-2">{{ product.description }}</p>
              </div>

              <div class="mt-4 flex items-center justify-between">
                <span class="text-xl font-bold text-gray-900">${{ product.price | number:'1.0-0' }}</span>
                <span class="text-xs text-gray-400">{{ product.stock }} in stock</span>
              </div>

              <button
                (click)="addToCart(product.id)"
                [disabled]="product.stock === 0"
                class="mt-4 w-full py-2.5 rounded-xl bg-gray-900 text-white text-sm font-medium
                       hover:bg-gray-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                {{ product.stock === 0 ? 'Out of Stock' : 'Add to Cart' }}
              </button>
            </div>
          </div>
        </div>

        <!-- Result count -->
        <p *ngIf="!productsService.isLoading() && productsService.filteredProducts().length > 0"
          class="mt-6 text-sm text-gray-400 text-right">
          Showing {{ productsService.filteredProducts().length }} product(s)
        </p>
      </div>
    </div>
  </div>
</div>

<div class="min-h-screen bg-gray-50 py-10">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Back -->
    <a routerLink="/products"
      class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-gray-900 transition-colors mb-8">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Back to Products
    </a>

    <!-- Loading -->
    <div *ngIf="!productsService.selectedProduct()"
      class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-gray-900"></div>
    </div>

    <!-- Product -->
    <ng-container *ngIf="productsService.selectedProduct() as product">
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="grid grid-cols-1 lg:grid-cols-2">

          <!-- Image -->
          <div class="aspect-square bg-gray-100 overflow-hidden">
            <img
              [src]="product.image"
              [alt]="product.name"
              class="w-full h-full object-cover">
          </div>

          <!-- Details -->
          <div class="p-8 lg:p-12 flex flex-col justify-center">

            <span class="text-sm font-medium text-gray-400 uppercase tracking-wide">
              {{ productsService.getCategoryName(product.categoryId) }}
            </span>

            <h1 class="mt-2 text-3xl lg:text-4xl font-serif font-bold text-gray-900">
              {{ product.name }}
            </h1>

            <p class="mt-4 text-gray-600 text-base leading-relaxed">
              {{ product.description }}
            </p>

            <div class="mt-6 flex items-center gap-4">
              <span class="text-3xl font-bold text-gray-900">
                ${{ product.price | number:'1.0-0' }}
              </span>
              <span [class]="product.stock > 0 ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50'"
                class="text-sm font-medium px-3 py-1 rounded-full">
                {{ product.stock > 0 ? product.stock + ' in stock' : 'Out of stock' }}
              </span>
            </div>

            <!-- Quantity -->
            <div class="mt-8" *ngIf="product.stock > 0">
              <label class="block text-sm font-medium text-gray-700 mb-3">Quantity</label>
              <div class="flex items-center gap-3">
                <button (click)="decrement()"
                  class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold transition-colors">
                  -
                </button>
                <span class="w-10 text-center text-gray-900 font-semibold text-lg">{{ quantity }}</span>
                <button (click)="increment()"
                  class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold transition-colors">
                  +
                </button>
              </div>
            </div>

            <!-- Actions -->
            <div class="mt-8 flex flex-col sm:flex-row gap-3">
              <button
                (click)="addToCart()"
                [disabled]="product.stock === 0"
                class="flex-1 py-3 rounded-xl text-sm font-semibold transition-all duration-200
                       disabled:opacity-40 disabled:cursor-not-allowed"
                [class]="added
                  ? 'bg-green-600 text-white'
                  : 'bg-gray-900 text-white hover:bg-gray-700'">
                <span *ngIf="!added">Add to Cart</span>
                <span *ngIf="added" class="flex items-center justify-center gap-2">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                  </svg>
                  Added!
                </span>
              </button>

              <a routerLink="/cart"
                class="flex-1 py-3 rounded-xl border-2 border-gray-900 text-gray-900 text-sm font-semibold text-center hover:bg-gray-50 transition-colors">
                View Cart
              </a>
            </div>

          </div>
        </div>
      </div>
    </ng-container>
  </div>
</div>
